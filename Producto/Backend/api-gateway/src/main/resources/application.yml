spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      routes:
        - id: users-service
          uri: ${USERS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
        - id: karma-service
          uri: ${KARMA_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/karma/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/notifications/**
        - id: notification-websocket
          uri: ${NOTIFICATION_SERVICE_WS_URL:ws://localhost:8082}
          predicates:
            - Path=/ws/**

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change_this_secret_for_dev_only_change_in_prod_very_long_key}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health, info
