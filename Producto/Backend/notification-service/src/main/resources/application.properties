# =========================
# Configuración del servidor
# =========================
server.port=${SERVER_PORT:8082}

# =========================
# Configuración de la base de datos (Laragon por defecto)
# =========================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pichangapp_notifications?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Dialecto y configuración de Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# Configuración de JWT
# =========================
# Clave secreta para firmar tokens (usa una cadena larga y segura en producción)
app.jwt.secret=${JWT_SECRET:change_this_secret_for_dev_only_change_in_prod_very_long_key}

# Tiempo de expiración del token en milisegundos (ejemplo: 1 hora)
app.jwt.expiration-ms=3600000

# =========================
# Firebase Cloud Messaging
# =========================
fcm.project-id=${FCM_PROJECT_ID:pichangapp-fcm}
google.application.credentials=${GOOGLE_APPLICATION_CREDENTIALS:}

# =========================
# Logging
# =========================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Logs de tu paquete
logging.level.cl.duoc.pichangapp=DEBUG
