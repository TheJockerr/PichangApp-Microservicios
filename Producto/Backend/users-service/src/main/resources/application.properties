# =========================
# Configuración del servidor
# =========================
server.port=8083

# =========================
# Configuración de la base de datos
# =========================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pichangapp?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Dialecto y configuración de Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# Configuración de JWT
# =========================
# Clave secreta para firmar tokens (usa una cadena larga y segura en producción)
app.jwt.secret=${JWT_SECRET:change_this_secret_for_dev_only_change_in_prod_very_long_key}

# Tiempo de expiración del token en milisegundos (ejemplo: 1 hora)
app.jwt.expiration-ms=3600000

# =========================
# URLs de microservicios (para borrado de cuenta y perfiles públicos)
# =========================
karma.service.url=${KARMA_SERVICE_URL:https://karma-production-6cc0.up.railway.app}
events.service.url=${EVENTS_SERVICE_URL:https://eventos-production-efba.up.railway.app}
notification.service.url=${NOTIFICATION_SERVICE_URL:https://notificaciones-production-2962.up.railway.app}

# =========================
# Logging
# =========================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Logs de tu paquete
logging.level.cl.duoc.pichangapp=DEBUG

# =========================
# Configuración de Correo (SendGrid)
# =========================
sendgrid.api.key=${SENDGRID_API_KEY:SG.dev_placeholder_not_used_locally}
sendgrid.from.email=pichangapp.noreply@gmail.com
sendgrid.from.name=PichangApp
