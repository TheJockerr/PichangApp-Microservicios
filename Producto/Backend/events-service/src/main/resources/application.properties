server.port=8084
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pichangapp_events?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:change_this_secret_for_dev_only_change_in_prod_very_long_key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

karma.service.url=${KARMA_SERVICE_URL:http://localhost:8082}
users.service.url=${USERS_SERVICE_URL:http://localhost:8083}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8081}
service.internal.token=${SERVICE_INTERNAL_TOKEN:internal_token_dev}

spring.task.scheduling.pool.size=5
